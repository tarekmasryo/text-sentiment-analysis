name: safe-ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else pip install ruff; fi

      - name: Ruff
        run: ruff check .

      - name: Compile (sanity)
        run: |
          if [ -d repo_utils ]; then python -m compileall repo_utils; fi
          if [ -d scripts ]; then python -m compileall scripts; fi
          if [ -d src ]; then python -m compileall src; fi
